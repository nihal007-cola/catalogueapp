<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Cataloger</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#071a3a;
  --primary2:#0b2d66;
  --primary-light:#11408f;
  --secondary:#1fbf6b;
  --danger:#e74c3c;
  --border:#cfe0ff;
  --bg:#eef4ff;
  --text-dark:#1f2a3a;
}
*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:var(--bg);}

header{
  position:sticky;top:0;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;padding:18px 24px;
  display:flex;align-items:center;gap:14px;
  border-bottom:4px solid var(--secondary);
}
.logo{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--secondary),#2ecc71);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#07321c;
}
.panel{
  background:white;margin:18px;padding:20px;
  border-radius:16px;border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.tabs{display:flex;gap:12px;margin-bottom:18px;}
.tab{
  padding:10px 22px;border-radius:999px;
  border:1px solid var(--border);cursor:pointer;
  font-weight:900;background:white;
}
.tab.active{background:var(--primary);color:white;border-color:var(--primary);}
.zone{display:none;}
.zone.active{display:block;}

.scroll-zone{
  max-height:65vh;overflow:auto;
  border:1px solid var(--border);
  border-radius:12px;
}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid var(--border);padding:8px;font-weight:900;}
th{background:var(--primary);color:white;position:sticky;top:0;}

input,select{
  width:100%;padding:6px;border-radius:8px;
  border:1px solid var(--border);
  font-weight:900;font-size:12px;
}

.actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;}

.btn{
  border:none;border-radius:12px;padding:11px 14px;
  font-weight:900;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--secondary),#2ecc71);
  color:white;
}
.btn.dark{
  background:linear-gradient(135deg,var(--primary2),var(--primary-light));
}

.loading-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;
  z-index:9999;
}
.loading-overlay.show{display:flex;}
.loading-spinner{
  width:60px;height:60px;
  border:5px solid rgba(255,255,255,.3);
  border-radius:50%;
  border-top-color:var(--secondary);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<header>
  <div class="logo">S</div>
  <div>
    <div style="font-weight:900;font-size:18px;">SMS_CATALOGER</div>
    <div style="font-size:12px;color:#cfe0ff;">Offices of Nawnit Nihal</div>
  </div>
</header>

<div class="panel">

<div class="tabs">
  <div class="tab active" data-tab="add">ADD</div>
  <div class="tab" data-tab="report">REPORT</div>
</div>

<!-- ADD TAB -->
<div id="add" class="zone active">
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>Image</th>
<th>Design</th>
<th>MRP</th>
<th>Category</th>
</tr>
</thead>
<tbody id="addGrid"></tbody>
</table>
</div>
<div class="actions">
<button id="addBtn" class="btn"><i class="fas fa-upload"></i> SUBMIT ADD</button>
</div>
</div>

<!-- REPORT TAB -->
<div id="report" class="zone">
<div class="actions">
<input id="searchBox" placeholder="Search design..." style="flex:1;padding:10px;border-radius:30px;border:1px solid var(--border);font-weight:900;">
<button class="btn dark" onclick="printReport()"><i class="fas fa-print"></i> PRINT</button>
</div>
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>CAT (BANGLA)</th>
<th>CAT(ENG)</th>
<th>DESIGN NAME</th>
<th>MRP</th>
<th>AVAILABILITY</th>
</tr>
</thead>
<tbody id="reportGrid"></tbody>
</table>
</div>
</div>

</div>

<script>

const loadingOverlay=document.getElementById("loadingOverlay");
const addGrid=document.getElementById("addGrid");
const reportGrid=document.getElementById("reportGrid");
const searchBox=document.getElementById("searchBox");
const addBtn=document.getElementById("addBtn");

function showLoading(){ loadingOverlay.classList.add("show"); }
function hideLoading(){ loadingOverlay.classList.remove("show"); }

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
    if(tab.dataset.tab==="report") loadReport();
  };
});

async function buildRows(){
  try {
    const res=await fetch("/categories");
    const data=await res.json();
    const cats=data.categories || [];

    for(let i=0;i<30;i++){
      addGrid.innerHTML+=`
      <tr>
      <td><input type="file" class="img" accept="image/*"></td>
      <td><input class="design" placeholder="DES-123"></td>
      <td><input class="mrp" placeholder="999"></td>
      <td>
        <select class="cat" onchange="handleCategory(this)">
          <option value="">Select Category</option>
          ${cats.map(c=>`<option value="${c}">${c}</option>`).join("")}
          <option value="__add__">➕ Add New Category</option>
        </select>
      </td>
      </tr>`;
    }
  } catch(error) {
    console.error("Failed to load categories:", error);
  }
}
buildRows();

function handleCategory(select){
  if(select.value==="__add__"){
    const newCat=prompt("Enter New Category (ENG)");
    if(newCat && newCat.trim()){
      const val=newCat.trim().toUpperCase();
      const option=document.createElement("option");
      option.text=val;
      option.value=val;
      select.add(option, select.options[select.options.length-1]);
      select.value=val;
    }else{
      select.value="";
    }
  }
}

addBtn.onclick=async ()=>{
  const rows=document.querySelectorAll("#addGrid tr");
  let entries=[];

  for(let r of rows){
    const img=r.querySelector(".img").files[0];
    const design=r.querySelector(".design").value.trim();
    const mrp=r.querySelector(".mrp").value.trim();
    const cat=r.querySelector(".cat").value.trim();

    if(img && design && mrp && cat){
      showLoading();
      const base64=await fileToBase64(img);
      entries.push({image:base64,design,mrp,category_eng:cat});
    }
  }

  if(entries.length){
    try {
      await fetch("/render",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({entries})
      });
      alert(`✅ Successfully uploaded ${entries.length} design(s)`);
      
      // Clear inputs
      rows.forEach(r => {
        r.querySelector(".img").value = '';
        r.querySelector(".design").value = '';
        r.querySelector(".mrp").value = '';
        r.querySelector(".cat").value = '';
      });
    } catch(error) {
      alert("❌ Upload failed: " + error.message);
    }
  } else {
    alert("⚠️ No valid entries to upload");
  }
  
  hideLoading();
};

// FIXED: loadReport function - now handles the response correctly
async function loadReport(){
  showLoading();
  try {
    const res=await fetch("/report/available");
    const data=await res.json();  // This is now the array directly
    
    reportGrid.innerHTML="";
    data.forEach(r=>{
      reportGrid.innerHTML+=`
      <tr>
      <td>${r["CAT (BANGLA)"] || ''}</td>
      <td>${r["CAT(ENG)"] || ''}</td>
      <td>${r["DESIGN NAME"] || ''}</td>
      <td>${r["MRP"] || ''}</td>
      <td>
        <select onchange="toggleAvail('${r["DESIGN NAME"]}',this.value)">
          <option value="YES" ${r["AVAILABILITY"]==="YES"?"selected":""}>YES</option>
          <option value="NO" ${r["AVAILABILITY"]==="NO"?"selected":""}>NO</option>
        </select>
      </td>
      </tr>`;
    });
  } catch(error) {
    console.error("Failed to load report:", error);
    reportGrid.innerHTML = '<tr><td colspan="5" style="text-align:center;color:red;">Failed to load data</td></tr>';
  }
  hideLoading();
}

async function toggleAvail(design,status){
  if(!design) return;
  
  try {
    await fetch("/availability",{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({design,status})
    });
  } catch(error) {
    console.error("Failed to update availability:", error);
  }
}

searchBox.addEventListener("input",function(){
  const val=this.value.toLowerCase();
  document.querySelectorAll("#reportGrid tr").forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
  });
});

function printReport(){
  let html=`<h2 style="text-align:center;font-weight:900;">
  SMS_CATALOGER<br>Offices of Nawnit Nihal</h2>
  <table border="1" style="width:100%;border-collapse:collapse;font-family:Segoe UI;">
  <tr><th>CAT (BANGLA)</th><th>CAT(ENG)</th>
  <th>DESIGN NAME</th><th>MRP</th></tr>`;

  document.querySelectorAll("#reportGrid tr").forEach(r=>{
    if(r.style.display!=="none" && r.cells.length >= 4){
      html+=`<tr>
      <td>${r.cells[0]?.innerText || ''}</td>
      <td>${r.cells[1]?.innerText || ''}</td>
      <td>${r.cells[2]?.innerText || ''}</td>
      <td>${r.cells[3]?.innerText || ''}</td>
      </tr>`;
    }
  });

  html+="</table>";
  const w=window.open("");
  w.document.write(html);
  w.document.close();
  w.print();
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

</script>
</body>
</html>
