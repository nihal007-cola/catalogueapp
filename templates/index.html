<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Cataloger</title>

<style>
:root{
  --dark:#071a3a;
  --dark2:#0b2d66;
  --accent:#1fbf6b;
  --border:#cfe0ff;
  --bg:#eef4ff;
  --danger:#e74c3c;
}

*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:var(--bg);}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:linear-gradient(135deg,var(--dark),var(--dark2));
  color:white;
  padding:18px 24px;
  display:flex;
  align-items:center;
  gap:14px;
  border-bottom:4px solid var(--accent);
  z-index:100;
}

.logo{
  width:40px;height:40px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#2ecc71);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#07321c;
}

/* PANEL */
.panel{
  background:white;
  margin:18px;
  padding:20px;
  border-radius:16px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

/* TABS */
.tabs{
  display:flex;
  gap:12px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

.tab{
  padding:10px 22px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-weight:900;
  background:white;
  transition:.2s ease;
}

.tab.active{
  background:var(--dark);
  color:white;
  border-color:var(--dark);
}

.zone{display:none;}
.zone.active{display:block;}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  border:1px solid var(--border);
  padding:8px;
  font-weight:900;
}

th{
  background:var(--dark);
  color:white;
  position:sticky;
  top:0;
  z-index:5;
}

.scroll-zone{
  max-height:65vh;
  overflow:auto;
  border:1px solid var(--border);
  border-radius:12px;
}

input,select{
  width:100%;
  padding:6px;
  border-radius:8px;
  border:1px solid var(--border);
  font-weight:900;
  font-size:12px;
}

/* BUTTONS */
.actions{
  margin-top:16px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  padding:10px 20px;
  border-radius:10px;
  border:none;
  font-weight:900;
  cursor:pointer;
  background:var(--accent);
}

.btn.dark{
  background:var(--dark);
  color:white;
}

.btn.red{
  background:var(--danger);
  color:white;
}

/* LOADER */
.loading-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(4px);
  z-index:9999;
}

.loading-overlay.show{display:flex;}

.loading-spinner{
  width:70px;
  height:70px;
  border:6px solid rgba(255,255,255,.3);
  border-radius:50%;
  border-top-color:var(--accent);
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="loader" class="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<header>
  <div class="logo">S</div>
  <div>
    <div style="font-weight:900;font-size:18px;">SMS_CATALOGER</div>
    <div style="font-size:12px;color:#cfe0ff;">Offices of Nawnit Nihal</div>
  </div>
</header>

<div class="panel">

<div class="tabs">
  <div class="tab active" data-tab="add">ADD</div>
  <div class="tab" data-tab="remove">REMOVE</div>
  <div class="tab" data-tab="restock">RESTOCK</div>
  <div class="tab" data-tab="report">REPORT</div>
</div>

<!-- ADD -->
<div id="add" class="zone active">
  <div class="scroll-zone">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Design / Numeric</th>
          <th>MRP</th>
          <th>Category</th>
        </tr>
      </thead>
      <tbody id="addGrid"></tbody>
    </table>
  </div>

  <div class="actions">
    <button class="btn">SUBMIT ADD</button>
    <button class="btn red">DE-DUPLICATE</button>
  </div>

  <div class="actions">
    <input type="file" id="folderInput" webkitdirectory directory multiple>
    <button class="btn dark">ONE TIME FOLDER IMAGE SYNC</button>
  </div>
</div>

<!-- REMOVE -->
<div id="remove" class="zone">
  <div class="scroll-zone">
    <table>
      <thead><tr><th>Numeric Only</th></tr></thead>
      <tbody id="removeGrid"></tbody>
    </table>
  </div>
  <div class="actions">
    <button class="btn">SUBMIT REMOVE</button>
  </div>
</div>

<!-- RESTOCK -->
<div id="restock" class="zone">
  <div class="scroll-zone">
    <table>
      <thead><tr><th>Numeric Only</th></tr></thead>
      <tbody id="restockGrid"></tbody>
    </table>
  </div>
  <div class="actions">
    <button class="btn">SUBMIT RESTOCK</button>
  </div>
</div>

<!-- REPORT -->
<div id="report" class="zone">
  <div class="actions">
    <button class="btn dark" onclick="loadReport(true)">AVAILABLE ONLY</button>
    <button class="btn" onclick="loadReport(false)">ALL</button>
  </div>

  <div class="scroll-zone">
    <table>
      <thead id="reportHead"></thead>
      <tbody id="reportGrid"></tbody>
    </table>
  </div>
</div>

</div>

<script>

/* TAB SWITCH */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

/* BUILD 30 ROWS */
function buildRows(){
  const add=document.getElementById("addGrid");
  const remove=document.getElementById("removeGrid");
  const restock=document.getElementById("restockGrid");

  for(let i=0;i<30;i++){
    add.innerHTML+=`
      <tr>
        <td><input type="file" accept="image/jpeg"></td>
        <td><input></td>
        <td><input></td>
        <td><input></td>
      </tr>`;
    remove.innerHTML+=`<tr><td><input></td></tr>`;
    restock.innerHTML+=`<tr><td><input></td></tr>`;
  }
}

buildRows();

/* REPORT LOAD */
async function loadReport(availableOnly){
  const res=await fetch("/report/available?all="+(!availableOnly));
  const data=await res.json();

  if(!data.data.length)return;

  const headers=Object.keys(data.data[0]);
  reportHead.innerHTML="<tr>"+headers.map(h=>`<th>${h}</th>`).join("")+"</tr>";

  reportGrid.innerHTML="";
  data.data.forEach(row=>{
    if(!availableOnly || row["AVAILABILITY"]==="YES"){
      reportGrid.innerHTML+="<tr>"+headers.map(h=>`<td>${row[h]||""}</td>`).join("")+"</tr>";
    }
  });
}

</script>

</body>
</html>
