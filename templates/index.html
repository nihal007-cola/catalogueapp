<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Cataloger</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#071a3a;
  --primary2:#0b2d66;
  --primary-light:#11408f;
  --secondary:#1fbf6b;
  --danger:#e74c3c;
  --border:#cfe0ff;
  --bg:#eef4ff;
}
*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:var(--bg);}

header{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;padding:18px 24px;
  display:flex;align-items:center;gap:14px;
  border-bottom:4px solid var(--secondary);
}

.logo{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--secondary),#2ecc71);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#07321c;
}

.panel{
  background:white;margin:18px;padding:20px;
  border-radius:16px;border:1px solid var(--border);
}

.tabs{display:flex;gap:12px;margin-bottom:18px;}
.tab{
  padding:10px 22px;border-radius:999px;
  border:1px solid var(--border);cursor:pointer;
  font-weight:900;background:white;
}
.tab.active{background:var(--primary);color:white;}

.zone{display:none;}
.zone.active{display:block;}

.scroll-zone{
  max-height:60vh;overflow:auto;
  border:1px solid var(--border);
  border-radius:12px;
}

table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid var(--border);padding:8px;font-weight:900;}
th{background:var(--primary);color:white;}

input,select{
  width:100%;padding:6px;border-radius:8px;
  border:1px solid var(--border);
  font-weight:900;font-size:12px;
}

.actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;}

.btn{
  border:none;border-radius:12px;padding:10px 16px;
  font-weight:900;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--secondary),#2ecc71);
  color:white;
}
.btn.dark{background:linear-gradient(135deg,var(--primary2),var(--primary-light));}
.btn.danger{background:linear-gradient(135deg,var(--danger),#c0392b);}

.loading-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
}
.loading-overlay.show{display:flex;}
.loading-spinner{
  width:60px;height:60px;
  border:5px solid rgba(255,255,255,.3);
  border-top-color:var(--secondary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.sms-dialog-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
}
.sms-dialog-overlay.show{display:flex;}
.sms-dialog-box{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;padding:30px 40px;
  border-radius:20px;text-align:center;
  border:3px solid var(--secondary);
}
.sms-dialog-title{font-weight:900;margin-bottom:10px;}
.sms-dialog-btn{
  margin-top:15px;
  background:var(--secondary);
  border:none;padding:8px 20px;
  border-radius:999px;font-weight:900;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
<div class="loading-spinner"></div>
</div>

<div class="sms-dialog-overlay" id="smsDialog">
<div class="sms-dialog-box">
<div class="sms-dialog-title">SMS says</div>
<div id="smsMessage"></div>
<button class="sms-dialog-btn" onclick="closeSMS()">OK</button>
</div>
</div>

<header>
<div class="logo">S</div>
<div>
<div style="font-weight:900;font-size:18px;">SMS_CATALOGER</div>
<div style="font-size:12px;color:#cfe0ff;">Offices of Nawnit Nihal</div>
</div>
</header>

<div class="panel">

<div class="tabs">
<div class="tab active" data-tab="add">ADD</div>
<div class="tab" data-tab="report">REPORT</div>
</div>

<!-- ADD -->
<div id="add" class="zone active">
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>Image</th>
<th>Design</th>
<th>MRP</th>
<th>Category</th>
</tr>
</thead>
<tbody id="addGrid"></tbody>
</table>
</div>

<div class="actions">
<button id="addBtn" class="btn"><i class="fas fa-upload"></i> SUBMIT ADD</button>
<button id="dedupeBtn" class="btn danger"><i class="fas fa-trash"></i> DE-DUPLICATE</button>
</div>
</div>

<!-- REPORT -->
<div id="report" class="zone">

<div class="actions">
<input id="searchBox" placeholder="Search design..." style="flex:1;">
<button id="loadReportBtn" class="btn dark"><i class="fas fa-sync"></i> LOAD REPORT</button>
<button id="excelBtn" class="btn dark"><i class="fas fa-file-excel"></i> EXPORT EXCEL</button>
<button id="printBtn" class="btn dark"><i class="fas fa-print"></i> PRINT</button>
</div>

<div class="scroll-zone">
<table>
<thead>
<tr>
<th>CAT (BANGLA)</th>
<th>CAT(ENG)</th>
<th>DESIGN NAME</th>
<th>MRP</th>
<th>AVAILABILITY</th>
</tr>
</thead>
<tbody id="reportGrid"></tbody>
</table>
</div>
</div>

</div>

<script>

const addGrid=document.getElementById("addGrid");
const reportGrid=document.getElementById("reportGrid");

function showLoading(){document.getElementById("loadingOverlay").classList.add("show");}
function hideLoading(){document.getElementById("loadingOverlay").classList.remove("show");}
function showSMS(m){document.getElementById("smsMessage").innerText=m;document.getElementById("smsDialog").classList.add("show");}
function closeSMS(){document.getElementById("smsDialog").classList.remove("show");}

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
};
});

async function buildRows(){
const res=await fetch("/categories");
const cats=(await res.json()).categories;

for(let i=0;i<30;i++){
addGrid.innerHTML+=`
<tr>
<td><input type="file" class="img"></td>
<td><input class="design"></td>
<td><input class="mrp"></td>
<td>
<select class="cat" onchange="handleCat(this)">
<option value="">Select Category</option>
${cats.map(c=>`<option>${c}</option>`).join("")}
<option value="__add__">Add Category</option>
</select>
</td>
</tr>`;
}
}
buildRows();

function handleCat(sel){
if(sel.value==="__add__"){
const n=prompt("Enter New Category (ENG)");
if(n){
const v=n.toUpperCase();
const opt=document.createElement("option");
opt.value=v;opt.text=v;
sel.add(opt,sel.options[sel.options.length-1]);
sel.value=v;
}else{sel.value="";}
}
}

document.getElementById("addBtn").onclick=async()=>{
showLoading();
let entries=[];
document.querySelectorAll("#addGrid tr").forEach(async r=>{});
const rows=document.querySelectorAll("#addGrid tr");
for(let r of rows){
const img=r.querySelector(".img").files[0];
const design=r.querySelector(".design").value.trim();
const mrp=r.querySelector(".mrp").value.trim();
const cat=r.querySelector(".cat").value.trim();
if(img&&design&&mrp&&cat){
const b=await fileToBase64(img);
entries.push({image:b,design,mrp,category_eng:cat});
}
}
if(entries.length){
await fetch("/render",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({entries})});
}
hideLoading();
showSMS("Upload Complete");
};

document.getElementById("dedupeBtn").onclick=async()=>{
showLoading();
await fetch("/deduplicate",{method:"POST"});
hideLoading();
showSMS("Duplicates Removed");
};

document.getElementById("loadReportBtn").onclick=loadReport;

async function loadReport(){
showLoading();
const res=await fetch("/report/available");
const data=await res.json();
hideLoading();
reportGrid.innerHTML="";
data.data.forEach(r=>{
reportGrid.innerHTML+=`
<tr>
<td>${r["CAT (BANGLA)"]}</td>
<td>${r["CAT(ENG)"]}</td>
<td>${r["DESIGN NAME"]}</td>
<td>${r["MRP"]}</td>
<td>
<select onchange="toggleAvail('${r["DESIGN NAME"]}',this.value)">
<option value="YES" ${r["AVAILABILITY"]==="YES"?"selected":""}>YES</option>
<option value="NO" ${r["AVAILABILITY"]==="NO"?"selected":""}>NO</option>
</select>
</td>
</tr>`;
});
}

async function toggleAvail(d,s){
await fetch("/availability",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({design:d,status:s})});
}

document.getElementById("excelBtn").onclick=()=>{
window.location="/report/export/excel";
};

document.getElementById("printBtn").onclick=()=>window.print();

document.getElementById("searchBox").addEventListener("input",function(){
const val=this.value.toLowerCase();
document.querySelectorAll("#reportGrid tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
});
});

function fileToBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
});
}

</script>
</body>
</html>
