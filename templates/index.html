<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Cataloger</title>

<style>
:root{
  --dark:#071a3a;
  --dark2:#0b2d66;
  --accent:#1fbf6b;
  --border:#cfe0ff;
  --bg:#eef4ff;
  --danger:#e74c3c;
}
*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:var(--bg);}

header{
  position:sticky;top:0;
  background:linear-gradient(135deg,var(--dark),var(--dark2));
  color:white;padding:18px 24px;
  display:flex;align-items:center;gap:14px;
  border-bottom:4px solid var(--accent);
  z-index:100;
}
.logo{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#2ecc71);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#07321c;
}

.panel{
  background:white;margin:18px;padding:20px;
  border-radius:16px;border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.tabs{display:flex;gap:12px;margin-bottom:18px;}
.tab{
  padding:10px 22px;border-radius:999px;
  border:1px solid var(--border);cursor:pointer;
  font-weight:900;background:white;
}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);}

.zone{display:none;}
.zone.active{display:block;}

.scroll-zone{
  max-height:65vh;overflow:auto;
  border:1px solid var(--border);
  border-radius:12px;
}

table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid var(--border);padding:8px;font-weight:900;}
th{background:var(--dark);color:white;position:sticky;top:0;z-index:5;}

input,select{
  width:100%;padding:6px;border-radius:8px;
  border:1px solid var(--border);
  font-weight:900;font-size:12px;
}

.actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;}

.btn{
  padding:10px 20px;border-radius:10px;
  border:none;font-weight:900;cursor:pointer;
  background:var(--accent);
}
.btn.dark{background:var(--dark);color:white;}
.btn.red{background:var(--danger);color:white;}
.btn:disabled{opacity:.6;cursor:not-allowed;}

.loading-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);z-index:9999;
}
.loading-overlay.show{display:flex;}

.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
  z-index:99999;
}
.modal.show{display:flex;}
.modal-box{
  background:white;padding:30px;border-radius:16px;
  width:400px;text-align:center;font-weight:900;
}
.toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--dark);color:white;
  padding:12px 20px;border-radius:10px;
  font-weight:900;z-index:99999;
}
</style>
</head>

<body>

<div id="loader" class="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <div id="modalText"></div>
    <br>
    <button class="btn dark" onclick="closeModal()">OK</button>
  </div>
</div>

<header>
  <div class="logo">S</div>
  <div>
    <div style="font-weight:900;font-size:18px;">SMS_CATALOGER</div>
    <div style="font-size:12px;color:#cfe0ff;">Offices of Nawnit Nihal</div>
  </div>
</header>

<div class="panel">

<div class="tabs">
  <div class="tab active" data-tab="add">ADD</div>
  <div class="tab" data-tab="remove">REMOVE</div>
  <div class="tab" data-tab="restock">RESTOCK</div>
  <div class="tab" data-tab="report">REPORT</div>
</div>

<!-- ADD -->
<div id="add" class="zone active">
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>Image</th>
<th>Design</th>
<th>MRP</th>
<th>Category</th>
</tr>
</thead>
<tbody id="addGrid"></tbody>
</table>
</div>

<div class="actions">
<button id="addBtn" class="btn">SUBMIT ADD</button>
</div>
</div>

<!-- REMOVE -->
<div id="remove" class="zone">
<div class="scroll-zone">
<table><thead><tr><th>Numeric Only</th></tr></thead>
<tbody id="removeGrid"></tbody></table>
</div>
<div class="actions">
<button id="removeBtn" class="btn">SUBMIT REMOVE</button>
</div>
</div>

<!-- RESTOCK -->
<div id="restock" class="zone">
<div class="scroll-zone">
<table><thead><tr><th>Numeric Only</th></tr></thead>
<tbody id="restockGrid"></tbody></table>
</div>
<div class="actions">
<button id="restockBtn" class="btn">SUBMIT RESTOCK</button>
</div>
</div>

<!-- REPORT -->
<div id="report" class="zone">
<div class="actions">
<button class="btn dark" onclick="loadReport()">LOAD</button>
<button class="btn" onclick="exportCSV()">CSV</button>
<button class="btn" onclick="exportExcel()">Excel</button>
<button class="btn red" onclick="exportJSON()">JSON</button>
</div>
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>CAT (BANGLA)</th>
<th>CAT(ENG)</th>
<th>DESIGN NAME</th>
<th>MRP</th>
</tr>
</thead>
<tbody id="reportGrid"></tbody>
</table>
</div>
</div>

</div>

<script>

/* UTILITIES */
function showLoader(){loader.classList.add("show")}
function hideLoader(){loader.classList.remove("show")}
function showModal(msg){
modalText.innerText=msg;
modal.classList.add("show");
}
function closeModal(){modal.classList.remove("show")}
function toast(msg){
const t=document.createElement("div");
t.className="toast";
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2500);
}

/* TAB SWITCH */
document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
};
});

/* BUILD GRID */
async function buildRows(){
const res=await fetch("/categories");
const cats=(await res.json()).categories;

for(let i=0;i<30;i++){
addGrid.innerHTML+=`
<tr>
<td><input type="file" class="img"></td>
<td><input class="design"></td>
<td><input class="mrp"></td>
<td>
<select class="cat">
<option value="">Select Cat / Add Category</option>
${cats.map(c=>`<option>${c}</option>`).join("")}
<option value="__add__">Add Category</option>
</select>
</td>
</tr>`;
removeGrid.innerHTML+=`<tr><td><input class="r_design"></td></tr>`;
restockGrid.innerHTML+=`<tr><td><input class="s_design"></td></tr>`;
}
}
buildRows();

/* ADD CATEGORY */
document.addEventListener("change",function(e){
if(e.target.classList.contains("cat") && e.target.value==="__add__"){
let newCat=prompt("Enter New Category (ENG)");
if(!newCat)return;
newCat=newCat.toUpperCase();
const option=document.createElement("option");
option.textContent=newCat;
option.value=newCat;
e.target.insertBefore(option,e.target.lastElementChild);
e.target.value=newCat;
}
});

/* ADD SUBMIT */
addBtn.onclick=async()=>{
showLoader();
let entries=[];
let error=false;

for(const row of document.querySelectorAll("#addGrid tr")){
const file=row.querySelector(".img").files[0];
const design=row.querySelector(".design").value.trim();
const mrp=row.querySelector(".mrp").value.trim();
const cat=row.querySelector(".cat").value;

if(!file) continue;

if(!design || !mrp || !cat){
showModal("If image is uploaded, all fields must be filled.");
error=true;
break;
}

const base64=await fileToBase64(file);
entries.push({image:base64,design,mrp,category_eng:cat});
}

if(error || !entries.length){
hideLoader();
return;
}

const res=await fetch("/render",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({entries})
});
const data=await res.json();

hideLoader();

if(data.ok){
toast("ADD SUCCESS");
wipeUI();
}else{
showModal("Backend Error");
}
};

/* WIPE UI */
function wipeUI(){
document.querySelectorAll("#addGrid input").forEach(i=>i.value="");
document.querySelectorAll("#addGrid select").forEach(s=>s.selectedIndex=0);
}

/* REPORT */
async function loadReport(){
showLoader();
const res=await fetch("/report/available");
const data=await res.json();
hideLoader();

reportGrid.innerHTML="";
data.data.forEach(r=>{
reportGrid.innerHTML+=`
<tr>
<td>${r["CAT (BANGLA)"]}</td>
<td>${r["CAT(ENG)"]}</td>
<td>${r["DESIGN NAME"]}</td>
<td>${r["MRP"]}</td>
</tr>`;
});
}

/* EXPORTS */
function exportCSV(){
let csv="CAT (BANGLA),CAT(ENG),DESIGN NAME,MRP\n";
document.querySelectorAll("#reportGrid tr").forEach(r=>{
csv+=Array.from(r.cells).map(c=>c.innerText).join(",")+"\n";
});
download(csv,"report.csv","text/csv");
}
function exportJSON(){
let arr=[];
document.querySelectorAll("#reportGrid tr").forEach(r=>{
arr.push({
cat_bangla:r.cells[0].innerText,
cat_eng:r.cells[1].innerText,
design:r.cells[2].innerText,
mrp:r.cells[3].innerText
});
});
download(JSON.stringify(arr,null,2),"report.json","application/json");
}
function exportExcel(){
let html="<table>"+reportGrid.innerHTML+"</table>";
download(html,"report.xls","application/vnd.ms-excel");
}
function download(content,filename,type){
const blob=new Blob([content],{type});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=filename;
a.click();
}

function fileToBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
});
}
</script>
</body>
</html>
