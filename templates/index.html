<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Cataloger</title>
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#071a3a;
  --primary2:#0b2d66;
  --secondary:#1fbf6b;
  --danger:#e74c3c;
  --border:#cfe0ff;
  --bg:#eef4ff;
}
*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:var(--bg);}

header{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;padding:18px 24px;
  display:flex;align-items:center;gap:14px;
  border-bottom:4px solid var(--secondary);
}
.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  background:none;
  width:auto;
  height:auto;
}

.panel{
  background:white;margin:18px;padding:20px;
  border-radius:16px;border:1px solid var(--border);
}

.tabs{display:flex;gap:12px;margin-bottom:18px;}
.tab{
  padding:10px 22px;border-radius:999px;
  border:1px solid var(--border);cursor:pointer;
  font-weight:900;background:white;
}
.tab.active{background:var(--primary);color:white;}

.zone{display:none;}
.zone.active{display:block;}

.scroll-zone{
  max-height:60vh;overflow:auto;
  border:1px solid var(--border);
  border-radius:12px;
}

table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid var(--border);padding:8px;font-weight:900;}
th{background:var(--primary);color:white;}

/* CHANGE 1: Sticky header for REPORT table only */
#report thead th {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--primary);
    color: white;
}

/* Print styles for full page printing */
@media print {
    body * {
        visibility: hidden;
    }
    #report, #report * {
        visibility: visible;
    }
    #report {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
    }
    .scroll-zone {
        max-height: none !important;
        overflow: visible !important;
    }
    .actions, .tabs, header {
        display: none !important;
    }
}

input,select{
  width:100%;padding:6px;border-radius:8px;
  border:1px solid var(--border);
  font-weight:900;font-size:12px;
}

.actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;}

.btn{
  border:none;border-radius:12px;padding:10px 16px;
  font-weight:900;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--secondary),#2ecc71);
  color:white;
}
.btn.dark{background:linear-gradient(135deg,var(--primary2),#11408f);}
.btn.danger{background:linear-gradient(135deg,var(--danger),#c0392b);}

.loading-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
  z-index:999;
}
.loading-overlay.show{display:flex;}
.loading-spinner{
  width:60px;height:60px;
  border:5px solid rgba(255,255,255,.3);
  border-top-color:var(--secondary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* SMS MODAL */
.sms-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
  z-index:1000;
}
.sms-overlay.show{display:flex;}
.sms-box{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;padding:30px 40px;
  border-radius:20px;text-align:center;
  border:3px solid var(--secondary);
  min-width:320px;
}
.sms-box input{
  margin-top:10px;
}
.sms-actions{
  margin-top:15px;display:flex;gap:10px;justify-content:center;
}
.sms-btn{
  border:none;padding:8px 20px;border-radius:999px;
  font-weight:900;cursor:pointer;
}
.sms-ok{background:var(--secondary);color:white;}
.sms-cancel{background:var(--danger);color:white;}
</style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
<div class="loading-spinner"></div>
</div>

<div class="sms-overlay" id="smsOverlay">
<div class="sms-box">
<div id="smsTitle" style="font-weight:900;margin-bottom:10px;">SMS says</div>
<div id="smsMessage"></div>
<input id="smsInput" style="display:none;">
<div class="sms-actions">
<button class="sms-btn sms-ok" id="smsOk">OK</button>
<button class="sms-btn sms-cancel" id="smsCancel" style="display:none;">Cancel</button>
</div>
</div>
</div>

<header>
<div class="logo">
  <img src="{{ url_for('static', filename='onn_logo.png') }}" style="height:45px;">
</div>
<div>
<div style="font-weight:900;font-size:18px;">SMS_CATALOGER</div>
<div style="font-size:12px;color:#cfe0ff;">Offices of Nawnit Nihal</div>
</div>
</header>

<div class="panel">

<div class="tabs">
<div class="tab active" data-tab="add">ADD</div>
<div class="tab" data-tab="report">REPORT</div>
</div>

<div id="add" class="zone active">
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>Image</th>
<th>Design</th>
<th>MRP</th>
<th>Category</th>
</tr>
</thead>
<tbody id="addGrid"></tbody>
</table>
</div>
<div class="actions">
<button id="addBtn" class="btn"><i class="fas fa-upload"></i> SUBMIT ADD</button>
<button id="dedupeBtn" class="btn danger"><i class="fas fa-trash"></i> DE-DUPLICATE</button>
</div>
</div>

<div id="report" class="zone">
<div class="actions">
<input id="searchBox" placeholder="Search design..." style="flex:1;">
<button id="loadReportBtn" class="btn dark">LOAD REPORT</button>
<button id="csvBtn" class="btn dark">EXPORT CSV</button>
<button id="printBtn" class="btn dark">PRINT</button>
</div>
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>CAT (BANGLA)</th>
<th>CAT(ENG)</th>
<th>DESIGN NAME</th>
<th>MRP</th>
<th>AVAILABILITY</th>
</tr>
</thead>
<tbody id="reportGrid"></tbody>
</table>
</div>
</div>

</div>

<script>
const addGrid=document.getElementById("addGrid");
const reportGrid=document.getElementById("reportGrid");

function showLoading(){loadingOverlay.classList.add("show");}
function hideLoading(){loadingOverlay.classList.remove("show");}

function smsAlert(msg){
document.getElementById("smsMessage").innerText=msg;
document.getElementById("smsInput").style.display="none";
document.getElementById("smsCancel").style.display="none";
smsOverlay.classList.add("show");
}

function smsPrompt(msg,callback){
document.getElementById("smsMessage").innerText=msg;
const input=document.getElementById("smsInput");
input.value="";
input.style.display="block";
document.getElementById("smsCancel").style.display="inline-block";
smsOverlay.classList.add("show");
smsOk.onclick=()=>{
smsOverlay.classList.remove("show");
callback(input.value.trim());
};
smsCancel.onclick=()=>smsOverlay.classList.remove("show");
}

smsOk.onclick=()=>smsOverlay.classList.remove("show");

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
};
});

async function buildRows(){
const res=await fetch("/categories");
const cats=(await res.json()).categories;
const frag=document.createDocumentFragment();

for(let i=0;i<30;i++){
const tr=document.createElement("tr");
tr.innerHTML=`
<td><input type="file" class="img"></td>
<td><input class="design"></td>
<td><input class="mrp"></td>
<td>
<select class="cat">
<option value="">Select Category</option>
${cats.map(c=>`<option>${c}</option>`).join("")}
<option value="__add__">Add Category</option>
</select>
</td>`;
frag.appendChild(tr);
}
addGrid.appendChild(frag);
}
buildRows();

addGrid.addEventListener("change",function(e){
if(e.target.classList.contains("cat") && e.target.value==="__add__"){
smsPrompt("Enter New Category (ENG)",val=>{
if(val){
const v=val.toUpperCase();
const opt=document.createElement("option");
opt.value=v;opt.text=v;
e.target.add(opt,e.target.options[e.target.options.length-1]);
e.target.value=v;
}
});
}
});

document.getElementById("addBtn").onclick=async()=>{
showLoading();
let entries=[];
for(let r of addGrid.querySelectorAll("tr")){
const img=r.querySelector(".img").files[0];
const design=r.querySelector(".design").value.trim();
const mrp=r.querySelector(".mrp").value.trim();
const cat=r.querySelector(".cat").value.trim();
if(img&&design&&mrp&&cat){
const b=await fileToBase64(img);
entries.push({image:b,design,mrp,category_eng:cat});
}
}
if(entries.length){
await fetch("/render",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({entries})});
}
hideLoading();
smsAlert("Upload Complete");
};

document.getElementById("dedupeBtn").onclick=async()=>{
showLoading();
await fetch("/deduplicate",{method:"POST"});
hideLoading();
smsAlert("Duplicates Removed");
};

document.getElementById("loadReportBtn").onclick=async()=>{
showLoading();
const res=await fetch("/report/available");
const data=await res.json();
hideLoading();
reportGrid.innerHTML="";
const frag=document.createDocumentFragment();
data.data.forEach(r=>{
const tr=document.createElement("tr");
tr.innerHTML=`
<td>${r["CAT (BANGLA)"]}</td>
<td>${r["CAT(ENG)"]}</td>
<td>${r["DESIGN NAME"]}</td>
<td>${r["MRP"]}</td>
<td>
<select>
<option value="YES" ${r["AVAILABILITY"]==="YES"?"selected":""}>YES</option>
<option value="NO" ${r["AVAILABILITY"]==="NO"?"selected":""}>NO</option>
</select>
</td>`;
tr.querySelector("select").onchange=(e)=>{
fetch("/availability",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({design:r["DESIGN NAME"],status:e.target.value})});
};
frag.appendChild(tr);
});
reportGrid.appendChild(frag);
};

// CHANGE: Replace Excel with CSV export
document.getElementById("csvBtn").onclick=()=>{
    const rows = Array.from(document.querySelectorAll("#reportGrid tr"));
    if(rows.length === 0){
        smsAlert("No data to export");
        return;
    }
    
    // Get headers
    const headers = ["CAT (BANGLA)", "CAT(ENG)", "DESIGN NAME", "MRP", "AVAILABILITY"];
    
    // Get data from visible rows only (respects current search filter)
    const data = rows.map(row => {
        const cells = row.cells;
        return [
            cells[0]?.innerText || "",
            cells[1]?.innerText || "",
            cells[2]?.innerText || "",
            cells[3]?.innerText || "",
            cells[4]?.querySelector("select")?.value || ""
        ];
    }).filter(row => row.some(cell => cell !== "")); // Filter out empty rows
    
    // Create CSV content
    const csvContent = [
        headers.join(","),
        ...data.map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(","))
    ].join("\n");
    
    // Download CSV file
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", "sms_catalog_report.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
};

// FIX: Print all pages properly
document.getElementById("printBtn").onclick=()=>{
    // Ensure all rows are visible for printing
    const rows = Array.from(document.querySelectorAll("#reportGrid tr"));
    rows.forEach(row => row.style.display = "");
    
    // Small delay to ensure styles are applied
    setTimeout(() => {
        window.print();
    }, 50);
};

function fileToBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
});
}

// CHANGE 2: Google-style predictive DESIGN search - OPTIMIZED to prevent hanging
let searchTimeout = null;
const SEARCH_DELAY = 150; // milliseconds

document.getElementById("searchBox").addEventListener("input", function () {
    // Clear previous timeout
    if (searchTimeout) {
        clearTimeout(searchTimeout);
    }
    
    const searchBox = this;
    const query = searchBox.value;
    
    // Set new timeout
    searchTimeout = setTimeout(() => {
        const rows = Array.from(document.querySelectorAll("#reportGrid tr"));
        
        if (!query.trim()) {
            rows.forEach(r => r.style.display = "");
            return;
        }
        
        const upperQuery = query.trim().toUpperCase();
        let firstMatch = null;
        
        // Use requestAnimationFrame to prevent UI freezing
        requestAnimationFrame(() => {
            rows.forEach(row => {
                const designCell = row.cells[2];
                if (!designCell) return;
                
                const designText = designCell.innerText.toUpperCase();
                const numericPart = designText.replace(/\D/g, '');
                
                const isMatch =
                    designText.includes(upperQuery) ||
                    numericPart.startsWith(upperQuery);
                
                if (isMatch) {
                    row.style.display = "";
                    if (!firstMatch) firstMatch = row;
                } else {
                    row.style.display = "none";
                }
            });
            
            if (firstMatch) {
                firstMatch.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });
            }
        });
        
        searchTimeout = null;
    }, SEARCH_DELAY);
});
</script>
</body>
</html>
