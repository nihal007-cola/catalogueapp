<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Cataloger</title>

<style>
:root{
  --dark:#071a3a;
  --accent:#1fbf6b;
  --border:#cfe0ff;
  --bg:#eef4ff;
  --danger:#e74c3c;
}

*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:var(--bg);}

header{
  position:sticky;
  top:0;
  background:linear-gradient(135deg,var(--dark),#0b2d66);
  color:white;
  padding:18px 24px;
  display:flex;
  gap:14px;
  border-bottom:4px solid var(--accent);
  z-index:100;
}

.logo{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#2ecc71);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#07321c;
}

.panel{
  background:white;
  margin:16px;
  padding:16px;
  border-radius:14px;
  border:1px solid var(--border);
}

.tabs{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}

.tab{
  padding:8px 18px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-weight:900;
  background:white;
}

.tab.active{
  background:var(--dark);
  color:white;
}

.zone{display:none;}
.zone.active{display:block;}

table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid var(--border);padding:6px;font-weight:900;}
th{
  background:var(--dark);
  color:white;
  position:sticky;
  top:0;
  z-index:2;
}

input, select{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid var(--border);
  font-weight:900;
  font-size:12px;
}

.scroll-zone{
  max-height:65vh;
  overflow:auto;
  border:1px solid var(--border);
  border-radius:10px;
}

.actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;}

.btn{
  padding:10px 18px;
  border-radius:10px;
  border:none;
  font-weight:900;
  cursor:pointer;
  background:var(--accent);
}

.btn.dark{background:var(--dark);color:white;}
.btn.red{background:var(--danger);color:white;}

.toast-wrap{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.toast{
  background:white;
  border-left:6px solid var(--accent);
  padding:12px 18px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  font-weight:900;
}

.toast.bad{border-left-color:var(--danger);}

#pwdModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:white;
  padding:22px;
  border-radius:14px;
  width:280px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  text-align:center;
  font-weight:900;
}
</style>
</head>

<body>

<header>
  <div class="logo">S</div>
  <div>
    <div style="font-weight:900">SMS_CATALOGER</div>
    <div style="font-size:12px;color:#cfe0ff;">Offices of Nawnit Nihal</div>
  </div>
</header>

<div class="panel">

  <div class="tabs">
    <div class="tab active" id="tabAdd" onclick="switchTab('add')">ADD</div>
    <div class="tab" id="tabRemove" onclick="switchTab('remove')">REMOVE</div>
    <div class="tab" id="tabRestock" onclick="switchTab('restock')">RESTOCK</div>
    <div class="tab" id="tabReport" onclick="switchTab('report')">REPORT</div>
  </div>

  <!-- ADD -->
  <div id="addZone" class="zone active">
    <div class="scroll-zone">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Design</th>
            <th>MRP</th>
            <th>Category</th>
          </tr>
        </thead>
        <tbody id="addGrid"></tbody>
      </table>
    </div>
    <div class="actions">
      <button class="btn" onclick="askPassword('add')">SUBMIT ADD</button>
      <input type="file" id="csvInput" accept=".csv,.xlsx">
      <button class="btn dark" onclick="importCSV()">IMPORT</button>
      <button class="btn red" onclick="runDeduplicate()">DE-DUPLICATE</button>
    </div>
  </div>

  <!-- REMOVE -->
  <div id="removeZone" class="zone">
    <div class="scroll-zone">
      <table>
        <thead><tr><th>Design</th></tr></thead>
        <tbody id="removeGrid"></tbody>
      </table>
    </div>
    <div class="actions">
      <button class="btn" onclick="askPassword('remove')">SUBMIT REMOVE</button>
    </div>
  </div>

  <!-- RESTOCK -->
  <div id="restockZone" class="zone">
    <div class="scroll-zone">
      <table>
        <thead><tr><th>Design</th></tr></thead>
        <tbody id="restockGrid"></tbody>
      </table>
    </div>
    <div class="actions">
      <button class="btn" onclick="askPassword('restock')">SUBMIT RESTOCK</button>
    </div>
  </div>

  <!-- REPORT -->
  <div id="reportZone" class="zone">
    <div class="actions">
      <button class="btn dark" onclick="loadReport(true)">Available Only</button>
      <button class="btn" onclick="loadReport(false)">All</button>
      <button class="btn red" onclick="printSelected()">Generate PDF</button>
    </div>
    <div class="scroll-zone">
      <table>
        <thead>
          <tr>
            <th>Select</th>
            <th>Design</th>
            <th>MRP</th>
            <th>Availability</th>
          </tr>
        </thead>
        <tbody id="reportGrid"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

<div id="pwdModal">
  <div class="modal-box">
    Enter Password
    <input id="modalPwd" type="password">
    <button class="btn" onclick="validatePassword()">CONFIRM</button>
  </div>
</div>

<script>

let pendingAction=null;

function toast(msg,bad){
  toastWrap.innerHTML="";
  const div=document.createElement("div");
  div.className="toast"+(bad?" bad":"");
  div.textContent=msg;
  toastWrap.appendChild(div);
  setTimeout(()=>toastWrap.innerHTML="",1600);
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
  document.getElementById("tab"+name.charAt(0).toUpperCase()+name.slice(1)).classList.add("active");
  document.getElementById(name+"Zone").classList.add("active");
}

for(let i=0;i<30;i++){
  addGrid.innerHTML+=`<tr>
    <td><input type="file" accept="image/jpeg" class="img"></td>
    <td><input class="design"></td>
    <td><input class="mrp"></td>
    <td><input class="cat"></td>
  </tr>`;
  removeGrid.innerHTML+=`<tr><td><input class="r_design"></td></tr>`;
  restockGrid.innerHTML+=`<tr><td><input class="s_design"></td></tr>`;
}

function askPassword(action){
  pendingAction=action;
  modalPwd.value="";
  pwdModal.style.display="flex";
}

function validatePassword(){
  fetch("/checkPassword",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:modalPwd.value})
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.ok)return toast("Wrong Password",true);
    pwdModal.style.display="none";
    if(pendingAction==="add")bulkAdd();
    if(pendingAction==="remove")bulkRemove();
    if(pendingAction==="restock")bulkRestock();
  });
}

async function bulkAdd(){
  const rows=document.querySelectorAll("#addGrid tr");
  for(const row of rows){
    const file=row.querySelector(".img").files[0];
    const design=row.querySelector(".design").value.trim();
    const mrp=row.querySelector(".mrp").value.trim();
    const cat=row.querySelector(".cat").value.trim();
    if(!file||!design||!mrp)continue;

    const reader=new FileReader();
    reader.onload=async e=>{
      await fetch("/render",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          image:e.target.result,
          design:design,
          mrp:mrp,
          category_eng:cat
        })
      });
    };
    reader.readAsDataURL(file);
  }
  toast("Submitted");
  document.querySelectorAll("#addGrid input").forEach(i=>i.value="");
}

function bulkRemove(){
  document.querySelectorAll(".r_design").forEach(i=>{
    if(i.value.trim())
      fetch("/remove",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({design:i.value})});
  });
  toast("Removed");
}

function bulkRestock(){
  document.querySelectorAll(".s_design").forEach(i=>{
    if(i.value.trim())
      fetch("/restock",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({design:i.value})});
  });
  toast("Restocked");
}

function runDeduplicate(){
  fetch("/deduplicate",{method:"POST"})
  .then(r=>r.json())
  .then(d=>toast("Duplicates Removed: "+d.deleted_rows));
}

function loadReport(availableOnly){
  fetch("/report/available")
  .then(r=>r.json())
  .then(data=>{
    reportGrid.innerHTML="";
    data.data.forEach(row=>{
      if(!availableOnly||row.AVAILABILITY==="YES"){
        reportGrid.innerHTML+=`
        <tr>
          <td><input type="checkbox" class="sel"></td>
          <td>${row["DESIGN NAME"]}</td>
          <td>${row.MRP}</td>
          <td>${row.AVAILABILITY}</td>
        </tr>`;
      }
    });
  });
}

function printSelected(){
  const rows=document.querySelectorAll("#reportGrid tr");
  let html="<h2>Print Order</h2><table border='1' cellpadding='5'><tr><th>Design</th><th>MRP</th></tr>";
  rows.forEach(r=>{
    if(r.querySelector(".sel").checked){
      html+="<tr><td>"+r.cells[1].innerText+"</td><td>"+r.cells[2].innerText+"</td></tr>";
    }
  });
  html+="</table>";
  const w=window.open("");
  w.document.write(html);
  w.print();
}

function importCSV(){
  const file=document.getElementById("csvInput").files[0];
  if(!file)return toast("Select File",true);

  const reader=new FileReader();
  reader.onload=e=>{
    const blob=new Blob([e.target.result],{type:"text/csv"});
    const formData=new FormData();
    formData.append("file",blob,"import.csv");
    fetch("/importExcel",{method:"POST",body:formData})
    .then(r=>r.json())
    .then(d=>toast("Rows Added: "+d.rows_added));
  };
  reader.readAsText(file);
}

</script>
</body>
</html>
