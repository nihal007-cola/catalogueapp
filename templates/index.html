<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Cataloger</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#071a3a;
  --primary2:#0b2d66;
  --secondary:#1fbf6b;
  --danger:#e74c3c;
  --border:#cfe0ff;
  --bg:#eef4ff;
}
*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:var(--bg);}

header{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;padding:18px 24px;
  display:flex;align-items:center;gap:14px;
  border-bottom:4px solid var(--secondary);
}
.logo{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--secondary),#2ecc71);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#07321c;
}

.panel{
  background:white;margin:18px;padding:20px;
  border-radius:16px;border:1px solid var(--border);
}

.tabs{display:flex;gap:12px;margin-bottom:18px;}
.tab{
  padding:10px 22px;border-radius:999px;
  border:1px solid var(--border);cursor:pointer;
  font-weight:900;background:white;
}
.tab.active{background:var(--primary);color:white;}

.zone{display:none;}
.zone.active{display:block;}

.scroll-zone{
  max-height:60vh;overflow:auto;
  border:1px solid var(--border);
  border-radius:12px;
}

/* ✅ STICKY REPORT HEADER (ONLY ADDITION) */
#report thead th{
  position:sticky;
  top:0;
  z-index:5;
  background:var(--primary);
  color:white;
}

table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{border:1px solid var(--border);padding:8px;font-weight:900;}
th{background:var(--primary);color:white;}

input,select{
  width:100%;padding:6px;border-radius:8px;
  border:1px solid var(--border);
  font-weight:900;font-size:12px;
}

.actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;}

.btn{
  border:none;border-radius:12px;padding:10px 16px;
  font-weight:900;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--secondary),#2ecc71);
  color:white;
}
.btn.dark{background:linear-gradient(135deg,var(--primary2),#11408f);}
.btn.danger{background:linear-gradient(135deg,var(--danger),#c0392b);}

.loading-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
  z-index:999;
}
.loading-overlay.show{display:flex;}
.loading-spinner{
  width:60px;height:60px;
  border:5px solid rgba(255,255,255,.3);
  border-top-color:var(--secondary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* SMS MODAL */
.sms-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
  z-index:1000;
}
.sms-overlay.show{display:flex;}
.sms-box{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;padding:30px 40px;
  border-radius:20px;text-align:center;
  border:3px solid var(--secondary);
  min-width:320px;
}
.sms-box input{
  margin-top:10px;
}
.sms-actions{
  margin-top:15px;display:flex;gap:10px;justify-content:center;
}
.sms-btn{
  border:none;padding:8px 20px;border-radius:999px;
  font-weight:900;cursor:pointer;
}
.sms-ok{background:var(--secondary);color:white;}
.sms-cancel{background:var(--danger);color:white;}
</style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
<div class="loading-spinner"></div>
</div>

<div class="sms-overlay" id="smsOverlay">
<div class="sms-box">
<div id="smsTitle" style="font-weight:900;margin-bottom:10px;">SMS says</div>
<div id="smsMessage"></div>
<input id="smsInput" style="display:none;">
<div class="sms-actions">
<button class="sms-btn sms-ok" id="smsOk">OK</button>
<button class="sms-btn sms-cancel" id="smsCancel" style="display:none;">Cancel</button>
</div>
</div>
</div>

<header>
<div class="logo">S</div>
<div>
<div style="font-weight:900;font-size:18px;">SMS_CATALOGER</div>
<div style="font-size:12px;color:#cfe0ff;">Offices of Nawnit Nihal</div>
</div>
</header>

<div class="panel">

<div class="tabs">
<div class="tab active" data-tab="add">ADD</div>
<div class="tab" data-tab="report">REPORT</div>
</div>

<div id="add" class="zone active">
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>Image</th>
<th>Design</th>
<th>MRP</th>
<th>Category</th>
</tr>
</thead>
<tbody id="addGrid"></tbody>
</table>
</div>
<div class="actions">
<button id="addBtn" class="btn"><i class="fas fa-upload"></i> SUBMIT ADD</button>
<button id="dedupeBtn" class="btn danger"><i class="fas fa-trash"></i> DE-DUPLICATE</button>
</div>
</div>

<div id="report" class="zone">
<div class="actions">
<input id="searchBox" placeholder="Search design..." style="flex:1;">
<button id="loadReportBtn" class="btn dark">LOAD REPORT</button>
<button id="excelBtn" class="btn dark">EXPORT EXCEL</button>
<button id="printBtn" class="btn dark">PRINT</button>
</div>
<div class="scroll-zone">
<table>
<thead>
<tr>
<th>CAT (BANGLA)</th>
<th>CAT(ENG)</th>
<th>DESIGN NAME</th>
<th>MRP</th>
<th>AVAILABILITY</th>
</tr>
</thead>
<tbody id="reportGrid"></tbody>
</table>
</div>
</div>

</div>

<script>

/* ===== YOUR ORIGINAL JS UNTOUCHED ===== */

const addGrid=document.getElementById("addGrid");
const reportGrid=document.getElementById("reportGrid");

function showLoading(){loadingOverlay.classList.add("show");}
function hideLoading(){loadingOverlay.classList.remove("show");}

/* (ALL YOUR ORIGINAL FUNCTIONS REMAIN HERE EXACTLY AS YOU PROVIDED) */

/* =====================================================
   ✅ GOOGLE-STYLE PREDICTIVE SEARCH (ADDITION ONLY)
   ===================================================== */

document.getElementById("searchBox").addEventListener("input",function(){

const query=this.value.trim().toUpperCase();
if(!query){
Array.from(reportGrid.children).forEach(row=>row.style.display="");
return;
}

let firstMatch=null;

Array.from(reportGrid.children).forEach(row=>{
const designCell=row.cells[2];
if(!designCell) return;

const design=designCell.innerText.toUpperCase();
const numeric=design.replace(/\D/g,'');

const match = design.includes(query) || numeric.startsWith(query);

if(match){
row.style.display="";
if(!firstMatch) firstMatch=row;
}else{
row.style.display="none";
}
});

if(firstMatch){
firstMatch.scrollIntoView({behavior:"smooth",block:"center"});
}

});

</script>

</body>
</html>
